<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Archive 点击和滑动动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            z-index: 1;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .click-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>点击或滑动屏幕</h1>
        <p>查看Blue Archive风格的动画效果</p>
    </div>
    <canvas class="click-canvas"></canvas>

    <script>
        // Canvas相关变量
        const canvas = document.querySelector('.click-canvas');
        let ctx = null;
        let animationId = null;
        const clickEffects = [];
        const swipeEffect = {
            active: false,
            path: [],
            particles: []
        };

        // 轨迹点类
        class TrailPoint {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.alpha = 1.0;
                this.radius = 3;
            }
        }

        // 轨迹粒子类（三角形）
        class TrailParticle {
            constructor(x, y, angle) {
                const config = getSwipeConfig();
                this.x = x;
                this.y = y;
                this.size = 4 + Math.random() * 6;
                this.speed = 2 + Math.random() * 3;
                this.angle = angle + (Math.random() - 0.5) * 0.8;
                this.alpha = 1.0;
                this.decay = 0.04 + Math.random() * 0.02;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.15;
                this.color = Math.random() > 0.6 ? '#77deff' : '#ffffff';
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.alpha -= this.decay;
                this.rotation += this.rotationSpeed;
                this.size *= 0.92;

                return this.alpha > 0;
            }

            draw(ctx, config) {
                if (this.alpha <= 0) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.globalAlpha = this.alpha;

                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = config.particleShadowBlur;

                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(this.size * 0.866, this.size * 0.5);
                ctx.lineTo(-this.size * 0.866, this.size * 0.5);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        // 响应式配置
        function getEffectConfig() {
            const viewportWidth = window.innerWidth;
            const baseWidth = 1600;
            const scale = viewportWidth / baseWidth;

            return {
                radius: 25 * Math.max(1, scale),
                duration: 800,
                sizeMin: 8 * Math.max(1, scale),
                sizeMax: 12 * Math.max(1, scale),
                speedMin: 30 * Math.max(1, scale),
                speedMax: 40 * Math.max(1, scale),
                delayMax: 200,
                shadowBlur: 10 * Math.max(1, scale),
                tailShadowBlur: 8 * Math.max(1, scale),
                innerShadowBlur: 20 * Math.max(1, scale),
                offset: 8 * Math.max(1, scale),
                outerRadiusOffset: 8 * Math.max(1, scale),
                radiusGrowth: 6 * Math.max(1, scale)
            };
        }

        // 滑动效果配置
        function getSwipeConfig() {
            const viewportWidth = window.innerWidth;
            const baseWidth = 1600;
            const scale = viewportWidth / baseWidth;

            return {
                lineWidth: 3 * Math.max(1, scale),
                lineColor: '#77deff',
                lineShadowBlur: 10 * Math.max(1, scale),
                trailDecay: 0.08,
                particleShadowBlur: 8 * Math.max(1, scale),
                particleSpawnRate: 0.3
            };
        }

        // 点击效果类
        class ClickEffect {
            constructor(x, y) {
                const config = getEffectConfig();

                this.x = x;
                this.y = y;
                this.startTime = Date.now();
                this.duration = config.duration;
                this.rotation1 = Math.random() * Math.PI * 2;
                this.rotation2 = Math.random() * Math.PI * 2;
                this.radius = config.radius;

                this.triangles = [];
                this.createTriangles(config);
            }

            createTriangles(config) {
                const triangleCount = 3 + Math.floor(Math.random() * 4);

                for (let i = 0; i < triangleCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const delay = Math.random() * config.delayMax;

                    this.triangles.push({
                        angle: angle,
                        delay: delay,
                        size: config.sizeMin + Math.random() * config.sizeMax,
                        speed: config.speedMin + Math.random() * config.speedMax,
                        color: Math.random() > 0.5 ? '#77deff' : '#ffffff',
                        rotationSpeed: (Math.random() - 0.5) * 0.1
                    });
                }
            }

            draw(ctx, currentTime) {
                const config = getEffectConfig();
                const elapsed = currentTime - this.startTime;
                const progress = Math.min(elapsed / this.duration, 1);

                ctx.save();
                ctx.translate(this.x, this.y);

                const scale = 1 + progress * 0.3;
                const alpha = Math.pow(1 - progress, 1.5);
                const currentRadius = this.radius + config.outerRadiusOffset + progress * config.radiusGrowth;

                ctx.globalAlpha = alpha;
                ctx.scale(scale, scale);

                this.drawOuterCircle(ctx, alpha, currentRadius, config);
                this.drawArcTails(ctx, progress, currentRadius, config);
                this.drawTriangles(ctx, elapsed, config);

                ctx.restore();

                return progress < 1;
            }

            drawOuterCircle(ctx, alpha, currentRadius, config) {
                const centerRadius = currentRadius + config.outerRadiusOffset;

                ctx.beginPath();
                ctx.arc(0, 0, centerRadius, 0, Math.PI * 2);

                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, centerRadius);
                gradient.addColorStop(0, `rgba(195, 235, 255, ${alpha * 0.8})`);
                gradient.addColorStop(0.7, `rgba(195, 235, 255, ${alpha * 0.4})`);
                gradient.addColorStop(1, `rgba(195, 235, 255, 0)`);

                ctx.fillStyle = gradient;
                ctx.shadowColor = '#c3ebff';
                ctx.shadowBlur = config.shadowBlur;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            drawArcTails(ctx, progress, currentRadius, config) {
                if (progress < 0.3) return;

                const tailProgress = (progress - 0.3) / 0.7;

                ctx.save();
                ctx.globalAlpha = Math.max(0, 1 - progress * 1.2);

                const tail1Angle = this.rotation1 - tailProgress * 2;
                const tail2Angle = this.rotation2 + Math.PI - tailProgress * 2;

                for (let i = 0; i < 8; i++) {
                    const offset = i * config.offset;
                    const alpha = (1 - progress) * (1 - i * 0.12);

                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.strokeStyle = '#77deff';
                    ctx.lineWidth = Math.max(1, 3 - i * 0.3);
                    ctx.lineCap = 'round';

                    ctx.shadowColor = '#77deff';
                    ctx.shadowBlur = config.tailShadowBlur - i;

                    const startAngle = tail1Angle - (offset * Math.PI / 180);
                    const endAngle = tail1Angle + Math.PI * 0.6 - (offset * Math.PI / 180);
                    ctx.beginPath();
                    ctx.arc(0, 0, currentRadius, startAngle, endAngle);
                    ctx.stroke();

                    ctx.restore();
                }

                for (let i = 0; i < 8; i++) {
                    const offset = i * config.offset;
                    const alpha = (1 - progress) * (1 - i * 0.12);

                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = Math.max(1, 3 - i * 0.3);
                    ctx.lineCap = 'round';

                    ctx.shadowColor = '#ffffff';
                    ctx.shadowBlur = config.tailShadowBlur - i;

                    const startAngle = tail2Angle - (offset * Math.PI / 180);
                    const endAngle = tail2Angle + Math.PI * 0.4 - (offset * Math.PI / 180);
                    ctx.beginPath();
                    ctx.arc(0, 0, currentRadius, startAngle, endAngle);
                    ctx.stroke();

                    ctx.restore();
                }

                ctx.restore();
            }

            drawTriangles(ctx, elapsed, config) {
                this.triangles.forEach((triangle) => {
                    const triangleProgress = Math.max(0, (elapsed - triangle.delay) / (this.duration - triangle.delay));

                    if (triangleProgress <= 0 || triangleProgress >= 1) return;

                    const distance = triangle.speed * triangleProgress;
                    const size = triangle.size * (1 - triangleProgress * 0.8);
                    const brightness = Math.sin(triangleProgress * Math.PI * 6) * 0.4 + 0.8;

                    ctx.save();
                    ctx.translate(
                        Math.cos(triangle.angle) * (this.radius + distance),
                        Math.sin(triangle.angle) * (this.radius + distance)
                    );

                    ctx.rotate(triangle.angle + elapsed * triangle.rotationSpeed / 1000);

                    ctx.globalAlpha = 1 - triangleProgress;

                    ctx.fillStyle = triangle.color;
                    ctx.shadowColor = triangle.color;
                    ctx.shadowBlur = config.shadowBlur;

                    ctx.beginPath();
                    ctx.moveTo(0, -size);
                    ctx.lineTo(size * 0.866, size * 0.5);
                    ctx.lineTo(-size * 0.866, size * 0.5);
                    ctx.closePath();
                    ctx.fill();

                    ctx.globalCompositeOperation = 'lighter';
                    ctx.fillStyle = triangle.color;
                    ctx.globalAlpha = brightness * 0.3;
                    ctx.shadowBlur = config.innerShadowBlur;
                    ctx.shadowColor = triangle.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -size * 0.8);
                    ctx.lineTo(size * 0.693, size * 0.4);
                    ctx.lineTo(-size * 0.693, size * 0.4);
                    ctx.closePath();
                    ctx.fill();

                    ctx.restore();
                });
            }
        }

        // Canvas相关函数
        function initCanvas() {
            if (!canvas) return;

            const width = window.innerWidth;
            const height = window.innerHeight;

            // 设置Canvas的实际像素尺寸
            canvas.width = width;
            canvas.height = height;

            ctx = canvas.getContext('2d');
            // 重置变换矩阵，然后应用设备像素比缩放
            ctx.setTransform(1, 0, 0, 1, 0, 0);
        }

        function animate() {
            if (!ctx) return;

            const currentTime = Date.now();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制点击效果
            for (let i = clickEffects.length - 1; i >= 0; i--) {
                const effect = clickEffects[i];
                if (!effect.draw(ctx, currentTime)) {
                    clickEffects.splice(i, 1);
                }
            }

            // 绘制滑动效果
            drawSwipeEffect(currentTime);

            if (clickEffects.length > 0 || swipeEffect.active || swipeEffect.path.length > 0 || swipeEffect.particles.length > 0) {
                animationId = requestAnimationFrame(animate);
            } else {
                animationId = null;
            }
        }

        // 绘制滑动效果
        function drawSwipeEffect(currentTime) {
            const config = getSwipeConfig();

            // 绘制轨迹线
            if (swipeEffect.path.length > 1) {
                ctx.save();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let i = 0; i < swipeEffect.path.length - 1; i++) {
                    const point = swipeEffect.path[i];
                    const nextPoint = swipeEffect.path[i + 1];

                    if (point.alpha <= 0) continue;

                    ctx.beginPath();
                    ctx.strokeStyle = config.lineColor;
                    ctx.lineWidth = config.lineWidth * point.alpha;
                    ctx.shadowColor = config.lineColor;
                    ctx.shadowBlur = config.lineShadowBlur * point.alpha;

                    ctx.moveTo(point.x, point.y);
                    ctx.lineTo(nextPoint.x, nextPoint.y);
                    ctx.stroke();

                    point.alpha -= config.trailDecay;
                }

                ctx.restore();

                // 移除已消失的轨迹点
                swipeEffect.path = swipeEffect.path.filter(point => point.alpha > 0);
            }

            // 绘制粒子
            for (let i = swipeEffect.particles.length - 1; i >= 0; i--) {
                const particle = swipeEffect.particles[i];
                if (!particle.update()) {
                    swipeEffect.particles.splice(i, 1);
                } else {
                    particle.draw(ctx, config);
                }
            }
        }

        function handleClickEvent(event) {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            clickEffects.push(new ClickEffect(x, y));

            if (!animationId) {
                animationId = requestAnimationFrame(animate);
            }
        }

        // 滑动事件处理器
        function handleMouseDown(event) {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            swipeEffect.active = true;
            swipeEffect.path = [new TrailPoint(x, y)];
            swipeEffect.particles = [];

            if (!animationId) {
                animationId = requestAnimationFrame(animate);
            }
        }

        function handleMouseMove(event) {
            if (!swipeEffect.active) return;

            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            const config = getSwipeConfig();
            const lastPoint = swipeEffect.path[swipeEffect.path.length - 1];

            // 计算距离
            const dx = x - lastPoint.x;
            const dy = y - lastPoint.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // 只有一定距离后才添加新点
            if (distance > 5) {
                const newPoint = new TrailPoint(x, y);

                // 计算移动角度用于生成粒子
                const angle = Math.atan2(dy, dx);

                // 在轨迹周围生成粒子
                for (let i = 0; i < 3; i++) {
                    const offsetAngle = angle + (Math.random() - 0.5) * Math.PI * 0.6;
                    const offsetDist = 5 + Math.random() * 10;
                    const px = x + Math.cos(offsetAngle) * offsetDist;
                    const py = y + Math.sin(offsetAngle) * offsetDist;
                    const particleAngle = offsetAngle + (Math.random() - 0.5) * 0.5;

                    swipeEffect.particles.push(new TrailParticle(px, py, particleAngle));
                }

                swipeEffect.path.push(newPoint);
            }
        }

        function handleMouseUp() {
            swipeEffect.active = false;
        }

        function handleTouchStart(event) {
            event.preventDefault();
            const touch = event.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            swipeEffect.active = true;
            swipeEffect.path = [new TrailPoint(x, y)];
            swipeEffect.particles = [];

            if (!animationId) {
                animationId = requestAnimationFrame(animate);
            }
        }

        function handleTouchMove(event) {
            event.preventDefault();
            if (!swipeEffect.active) return;

            const touch = event.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            const config = getSwipeConfig();
            const lastPoint = swipeEffect.path[swipeEffect.path.length - 1];

            // 计算距离
            const dx = x - lastPoint.x;
            const dy = y - lastPoint.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // 只有一定距离后才添加新点
            if (distance > 5) {
                const newPoint = new TrailPoint(x, y);

                // 计算移动角度用于生成粒子
                const angle = Math.atan2(dy, dx);

                // 在轨迹周围生成粒子
                for (let i = 0; i < 3; i++) {
                    const offsetAngle = angle + (Math.random() - 0.5) * Math.PI * 0.6;
                    const offsetDist = 5 + Math.random() * 10;
                    const px = x + Math.cos(offsetAngle) * offsetDist;
                    const py = y + Math.sin(offsetAngle) * offsetDist;
                    const particleAngle = offsetAngle + (Math.random() - 0.5) * 0.5;

                    swipeEffect.particles.push(new TrailParticle(px, py, particleAngle));
                }

                swipeEffect.path.push(newPoint);
            }
        }

        function handleTouchEnd(event) {
            event.preventDefault();
            swipeEffect.active = false;
        }

        function handleResize() {
            initCanvas();

            // 在窗口大小变化时清理正在进行的动画
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            // 清理所有效果，重新开始动画循环
            clickEffects.length = 0;
            swipeEffect.path = [];
            swipeEffect.particles = [];
            swipeEffect.active = false;
        }

        // 初始化
        window.addEventListener('resize', handleResize);

        // 点击事件
        document.addEventListener('click', handleClickEvent, { passive: true });

        // 鼠标滑动事件
        document.addEventListener('mousedown', handleMouseDown, { passive: true });
        document.addEventListener('mousemove', handleMouseMove, { passive: true });
        document.addEventListener('mouseup', handleMouseUp, { passive: true });

        // 触摸滑动事件
        document.addEventListener('touchstart', handleTouchStart, { passive: false });
        document.addEventListener('touchmove', handleTouchMove, { passive: false });
        document.addEventListener('touchend', handleTouchEnd, { passive: false });

        // 延迟初始化，确保DOM元素已经渲染
        setTimeout(() => {
            initCanvas();
        }, 0);
    </script>
</body>
</html>
